<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Receptionist · Login</title>

  <style>
    :root {
      --bg-1: #050816;
      --bg-2: #0b1023;
      --panel: rgba(20, 24, 39, 0.82);
      --panel-border: rgba(125, 211, 252, 0.16);

      --text: #eaf4ff;
      --muted: #9fb2cc;
      --input-bg: rgba(255, 255, 255, 0.08);
      --input-border: rgba(255, 255, 255, 0.08);

      --blue: #38bdf8;
      --blue-2: #5C73F2;
      --cyan: #00e5ff;
      --violet: #7c3aed;

      --shadow-soft: 0 20px 60px rgba(0, 0, 0, 0.45);
      --shadow-neon: 0 0 30px rgba(56, 189, 248, 0.18);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, rgba(92, 115, 242, 0.22), transparent 18%),
        radial-gradient(circle at 78% 22%, rgba(0, 229, 255, 0.12), transparent 14%),
        radial-gradient(circle at 65% 80%, rgba(124, 58, 237, 0.12), transparent 18%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2) 55%, #0b0f1f);
      overflow: hidden;
      position: relative;
    }

    /* Fondo tipo red tech */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 30%, rgba(124, 58, 237, 0.18) 0 1px, transparent 2px),
        radial-gradient(circle at 80% 18%, rgba(56, 189, 248, 0.18) 0 1px, transparent 2px),
        radial-gradient(circle at 70% 70%, rgba(0, 229, 255, 0.14) 0 1px, transparent 2px),
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: auto, auto, auto, 42px 42px, 42px 42px;
      opacity: 0.35;
      pointer-events: none;
    }

    .page {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      width: 100%;
      max-width: 470px;
      position: relative;
      padding: 42px 38px 30px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(33, 38, 58, 0.88), rgba(18, 22, 37, 0.92));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: var(--shadow-soft), var(--shadow-neon);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .auth-card::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      left: -88px;
      top: -74px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(92,115,242,0.96) 0%, rgba(92,115,242,0.74) 45%, rgba(92,115,242,0.08) 72%, transparent 74%);
      filter: blur(2px);
      pointer-events: none;
    }

    .auth-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--radius-xl);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      pointer-events: none;
    }

    .brand-icon {
      width: 68px;
      height: 68px;
      margin: 0 auto 14px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(92,115,242,0.24), rgba(0,229,255,0.18));
      border: 1px solid rgba(125, 211, 252, 0.18);
      box-shadow: 0 0 24px rgba(56, 189, 248, 0.18);
      position: relative;
      z-index: 2;
    }

    .brand-icon svg {
      width: 34px;
      height: 34px;
      fill: url(#iconGradient);
    }

    .eyebrow {
      text-align: center;
      margin: 2px 0 0;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      position: relative;
      z-index: 2;
    }

    h1 {
      margin: 8px 0 8px;
      text-align: center;
      font-size: 2.35rem;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.03em;
      position: relative;
      z-index: 2;
    }

    .title-accent {
      background: linear-gradient(90deg, #ffffff, var(--blue), var(--cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(56, 189, 248, 0.18);
    }

    .subtitle {
      margin: 0 0 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
      position: relative;
      z-index: 2;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 2;
    }

    .field {
      position: relative;
    }

    .field input {
      width: 100%;
      height: 64px;
      padding: 0 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 1.02rem;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease, background .2s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .field input::placeholder {
      color: #c8d3e3;
      opacity: 0.62;
    }

    .field input:focus {
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow:
        0 0 0 4px rgba(56, 189, 248, 0.10),
        0 0 24px rgba(56, 189, 248, 0.08);
      background: rgba(255, 255, 255, 0.10);
    }

    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: #cfd8e6;
      cursor: pointer;
      padding: 6px;
      opacity: 0.78;
    }

    .password-toggle:hover {
      opacity: 1;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      margin-top: -4px;
      margin-bottom: 4px;
    }

    .link {
      color: var(--blue);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .link:hover {
      color: var(--cyan);
    }

    .btn-primary {
      margin-top: 6px;
      height: 64px;
      border: none;
      border-radius: var(--radius-lg);
      color: white;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      cursor: pointer;
      background: linear-gradient(90deg, var(--violet), var(--blue-2), var(--blue));
      box-shadow:
        0 0 16px rgba(92, 115, 242, 0.28),
        0 0 34px rgba(56, 189, 248, 0.14);
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        0 0 22px rgba(92, 115, 242, 0.34),
        0 0 42px rgba(56, 189, 248, 0.18);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .auth-footer {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 0.96rem;
      position: relative;
      z-index: 2;
    }

    .auth-footer a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 700;
      margin-left: 6px;
    }

    .auth-footer a:hover {
      color: var(--blue);
    }

    .corner-glow {
      position: absolute;
      right: -40px;
      bottom: -40px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.18), transparent 65%);
      pointer-events: none;
      z-index: 1;
    }

    @media (max-width: 560px) {
      .auth-card {
        padding: 34px 22px 24px;
        max-width: 100%;
      }

      h1 {
        font-size: 1.95rem;
      }

      .field input,
      .btn-primary {
        height: 58px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="auth-card">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <linearGradient id="iconGradient" x1="0%" x2="100%" y1="0%" y2="100%">
              <stop offset="0%" stop-color="#7c3aed"></stop>
              <stop offset="55%" stop-color="#5C73F2"></stop>
              <stop offset="100%" stop-color="#00e5ff"></stop>
            </linearGradient>
          </defs>
          <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-3.33 0-6 1.79-6 4v1h12v-1c0-2.21-2.67-4-6-4Zm7-6h-2V6h-2v2h-2v2h2v2h2v-2h2Z"/>
        </svg>
      </div>

      <div class="eyebrow">AI Receptionist SaaS</div>
      <h1><span class="title-accent">Sign In</span></h1>
      <p class="subtitle">
        Accede al panel de conversaciones, clientes y configuración del negocio.
      </p>

      <form class="auth-form">
        <div class="field">
          <input type="email" placeholder="Email Address" />
        </div>

        <div class="field">
          <input id="password" type="password" placeholder="Password" />
          <button class="password-toggle" type="button" aria-label="Mostrar contraseña" onclick="togglePassword()">
            👁
          </button>
        </div>

        <div class="actions">
          <a class="link" href="#">Forgot password?</a>
        </div>

        <button class="btn-primary" type="submit">LOGIN</button>
      </form>

      <div class="auth-footer">
        ¿No tienes cuenta?
        <a href="#">Create account</a>
      </div>

      <div class="corner-glow"></div>
    </section>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
