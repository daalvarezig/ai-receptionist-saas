<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>AI Receptionist Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">
AI Receptionist
</div>

<nav>

<div class="nav-item active">Conversaciones</div>
<div class="nav-item">Clientes</div>
<div class="nav-item">Knowledge Base</div>
<div class="nav-item">Configuración</div>

</nav>

</aside>

<!-- MAIN -->

<div class="main">

<!-- CONVERSATIONS -->

<div class="conversations">

<div class="search">
<input placeholder="Buscar conversación">
</div>

<div class="conversation active">
Juan
<span>Hola</span>
</div>

<div class="conversation">
Maria
<span>¿Tenéis citas?</span>
</div>

<div class="conversation">
Pedro
<span>Gracias</span>
</div>

</div>

<!-- CHAT -->

<div class="chat">

<div class="chat-header">
Juan · WhatsApp
</div>

<div class="messages">

<div class="message user">
Hola
</div>

<div class="message ai">
Hola, ¿en qué puedo ayudarte?
</div>

</div>

<div class="chat-input">

<input placeholder="Escribe un mensaje">

<button>Enviar</button>

</div>

</div>

</div>

</div>

</body>
</html>
